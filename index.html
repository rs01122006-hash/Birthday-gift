<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎂</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
      padding:20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(12px);
      border-radius:25px;
      padding:35px 25px;
      text-align:center;
      color:white;
      box-shadow:0 8px 25px rgba(0,0,0,0.2);
      animation:fadeIn 1.2s ease;
    }

    h1{
      font-size:2.3rem;
      margin-bottom:10px;
      animation:bounce 2s infinite;
    }

    .cake{
      font-size:4rem;
      margin:15px 0;
    }

    p{
      font-size:1rem;
      line-height:1.7;
      margin-bottom:25px;
    }

    .btn{
      border:none;
      padding:14px 28px;
      border-radius:40px;
      background:white;
      color:#ff4f81;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
    }

    .btn:hover{
      transform:scale(1.05);
      background:#ffe6ef;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-8px);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .floating{
      position:absolute;
      width:18px;
      height:18px;
      background:rgba(255,255,255,0.5);
      border-radius:50%;
      animation:float 8s linear infinite;
      bottom:-50px;
    }

    @keyframes float{
      0%{
        transform:translateY(0) scale(1);
        opacity:1;
      }
      100%{
        transform:translateY(-110vh) scale(0);
        opacity:0;
      }
    }

    @media(max-width:480px){
      h1{
        font-size:1.9rem;
      }

      .cake{
        font-size:3.2rem;
      }

      p{
        font-size:0.95rem;
      }

      .container{
        padding:28px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Background Circles -->
  <div class="floating" style="left:10%; animation-duration:7s;"></div>
  <div class="floating" style="left:30%; animation-duration:10s;"></div>
  <div class="floating" style="left:50%; animation-duration:8s;"></div>
  <div class="floating" style="left:70%; animation-duration:11s;"></div>
  <div class="floating" style="left:90%; animation-duration:9s;"></div>

  <div class="container">
    <h1>Happy Birthday 🎉</h1>

    <div class="cake">🎂</div>

    <p>
      Wishing you a day filled with happiness, laughter, love, and unforgettable memories.
      May all your dreams come true and your smile always shine brightly! 💖
    </p>

    <button class="btn" onclick="launchConfetti()">
      Celebrate 🎊
    </button>
  </div>

  <script>
    // Auto confetti on load
    window.onload = () => {
      launchConfetti();
    };

    function launchConfetti() {
      confetti({
        particleCount: 180,
        spread: 120,
        origin: { y: 0.6 }
      });

      // Extra side confetti
      confetti({
        particleCount: 80,
        angle: 60,
        spread: 80,
        origin: { x: 0 }
      });

      confetti({
        particleCount: 80,
        angle: 120,
        spread: 80,
        origin: { x: 1 }
      });
    }
  </script>

</body>
</html>
